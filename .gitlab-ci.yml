stages:
  - test
  - quality
  - security

test:
  image: python:3.12
  stage: test
  script:
    - pip install -r requirements.txt
    - pytest

quality:
  image: python:3.12
  stage: quality
  script:
    - pip install -r requirements.txt
    - ruff check . || true
    - mypy . || true
    - flake8 . || true
    - pylint *.py || true
    - vulture . || true
    - pyupgrade --py312-plus *.py || true

security:
  image: python:3.12
  stage: security
  script:
    - pip install -r requirements.txt
    - bandit -r . || true
    - pip-audit || true
    - semgrep scan --config auto || true
