stages:
  - quality
  - security
  - test

image: python:3.12

before_script:
  - pip install -U pip
  - pip install pytest pytest-cov ruff mypy bandit pylint flake8 vulture semgrep pyupgrade pip-audit pre-commit

ruff:
  stage: quality
  script:
    - ruff check .
    - ruff format --check .

mypy:
  stage: quality
  script:
    - mypy . || true

security:
  stage: security
  script:
    - bandit -r . || true
    - pip-audit || true

test:
  stage: test
  script:
    - pytest || true
