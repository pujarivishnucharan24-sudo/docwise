image: python:3.12-slim

stages:
  - quality
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt

quality:
  stage: quality
  script:
    - ruff format --check .
    - ruff check .
    - mypy .
    - flake8 .
    - pylint app.py database.py export.py image_processing.py main.py ocr.py parser.py tests test_pipeline.py
    - vulture . --min-confidence 80
    - pyupgrade --py312-plus app.py database.py export.py image_processing.py main.py ocr.py parser.py tests/test_basic.py tests/test_main.py test_pipeline.py
    - git diff --exit-code

test:
  stage: test
  script:
    - pytest
  coverage: '/TOTAL.*\s+(\d+\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

security:
  stage: security
  script:
    - bandit -c pyproject.toml -r .
    - pip-audit -r requirements.txt
    - semgrep scan --config .semgrep.yml --error
    - gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
