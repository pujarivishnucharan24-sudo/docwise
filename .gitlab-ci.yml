stages:
  - format
  - lint
  - type_check
  - test
  - coverage

before_script:
  - python3 -m venv venv
  - source venv/bin/activate
  - python3 -m pip install --upgrade pip
  - python3 -m pip install -r requirements.txt
  - python3 -m pip install black ruff mypy pytest pytest-cov

format:
  stage: format
  script:
    - python3 -m black --check .

lint:
  stage: lint
  script:
    - python3 -m ruff check .

type_check:
  stage: type_check
  script:
    - python3 -m mypy . || true

test:
  stage: test
  script:
    - python3 -m pytest || true

coverage:
  stage: coverage
  script:
    - python3 -m pytest --cov=. --cov-report=term-missing || true
