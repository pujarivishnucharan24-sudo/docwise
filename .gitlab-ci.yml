stages:
  - quality
  - test
  - security

quality:
  image: python:3.12
  stage: quality
  script:
    - pip install -r requirements.txt
    - ruff check .
    - mypy . || true
    - flake8 . || true
    - pylint **/*.py || true

test:
  image: python:3.12
  stage: test
  script:
    - pip install -r requirements.txt
    - pytest --cov=. --cov-report=term-missing --cov-fail-under=50

security:
  image: python:3.12
  stage: security
  script:
    - pip install -r requirements.txt
    - bandit -r . || true
    - pip-audit || true
